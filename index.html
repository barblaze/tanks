-fx.on{opacity:1}  font-size:28px;font-weight:bold;color:var(--y);text-shadow:0 0 12px var(--y);  pointer-events:none;opacity:0;z-index:10;letter-spacing:3px}#combo.pop{animation:combopop .7s forwards}@explore </style> Use the above message and context to generate a prompt and call the task tool with subagent: explore</head><body><div id="root">  <div id="top-hud">    <div class="hud-cell"><div class="hud-lbl">LVL</div><div class="hud-val" id="h-level">1</div></div>    <div class="hud-cell"><div class="hud-lbl">SCORE</div><div class="hud-val" id="h-score">0</div></div>    <div class="hud-cell"><div class="hud-lbl">BEST</div><div class="hud-val" id="h-high">0</div></div>    <div class="hud-cell"><div class="hud-lbl">VIDAS</div><div class="lives-row" id="h-lives"></div></div>    <div class="hud-cell"><div class="hud-lbl">ENEMIGOS</div><div class="e-grid" id="h-enemies"></div></div>  </div>  <div id="arena-wrap">    <canvas id="c"></canvas>    <div id="freeze-fx"></div>    <div id="combo"></div>    <div id="overlay">      <div id="ov-title" style="color:var(--y)">TANK BATTLE ULTRA</div>      <div id="ov-sub">¡PROTEGE TU BASE!</div>      <div id="ov-score"></div>      <button class="ov-btn" id="ov-btn1" onclick="G.startGame()">▶ INICIAR</button>    </div>  </div>  <div id="bottom-panel">    <div id="joystick-zone">      <div id="joy-base"></div>      <div id="joy-stick"></div>    </div>    <div id="pu-row">      <div style="display:flex;gap:4px">        <div class="pu-btn" id="pb0" data-i="0" title="Escudo">🛡<span class="pu-cnt" id="pc0">0</span></div>        <div class="pu-btn" id="pb1" data-i="1" title="Velocidad">⚡<span class="pu-cnt" id="pc1">0</span></div>      </div>      <div style="display:flex;gap:4px">        <div class="pu-btn" id="pb2" data-i="2" title="Bomba">💣<span class="pu-cnt" id="pc2">0</span></div>        <div class="pu-btn" id="pb3" data-i="3" title="Congelar">❄<span class="pu-cnt" id="pc3">0</span></div>      </div>    </div>    <div id="fire-btn">🔥</div>  </div></div><script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script><script>const T={E:0,B:1,S:2,W:3,X:4,BASE:5}; // Empty,Brick,Steel,Water,buX(sh),Baseconst D={U:0,R:1,D:2,L:3};const DX=[0,1,0,-1],DY=[-1,0,1,0];const ETYPES=[  {n:'basic', hp:1,spd:1.1,pts:100,col:0xe04040,fr:2200,smart:false},  {n:'fast',  hp:1,spd:2.6,pts:200,col:0x40e0e0,fr:1600,smart:false},  {n:'armor', hp:4,spd:0.9,pts:300,col:0x80e040,fr:2800,smart:true},  {n:'power', hp:2,spd:1.6,pts:400,col:0xe040e0,fr:1100,smart:true},  {n:'kamikaze',hp:1,spd:2.0,pts:150,col:0xff8000,fr:9999,smart:true,kamikaze:true},];  h(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);},  find(map,sr,sc,er,ec){    if(sr===er&&sc===ec)return[];    const key=(r,c)=>r*COLS+c;    const open=new Map(),closed=new Set();    const g={},f={},par={};    const start=key(sr,sc);    g[start]=0;f[start]=this.h(sr,sc,er,ec);    open.set(start,{r:sr,c:sc});    let iter=0;    while(open.size&&iter++<400){      // Nodo con menor f      let best=null,bv=Infinity;      for(const[k,n]of open){if(f[k]<bv){bv=f[k];best=k;}}      if(best===null)break;      const{r,c}=open.get(best);      if(r===er&&c===ec){        // Reconstruir        const path=[];let cur=best;        while(par[cur]!==undefined){path.unshift(cur);cur=par[cur];}        if(!path.length)return[];        const first=path[0];        const fr=Math.floor(first/COLS),fc=first%COLS;        if(fr<sr)return D.U;if(fr>sr)return D.D;        if(fc<sc)return D.L;return D.R;      }      open.delete(best);      closed.add(best);      for(let d=0;d<4;d++){        const nr=r+DY[d],nc=c+DX[d];        if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;        const t=map[nr][nc];        if(t===T.S||t===T.W)continue; // no pasan acero/agua        const nk=key(nr,nc);        if(closed.has(nk))continue;        const ng=g[best]+1+(t===T.B?2:0); // ladrillo cuesta más        if(ng<(g[nk]??Infinity)){          g[nk]=ng;f[nk]=ng+this.h(nr,nc,er,ec);          par[nk]=best;          open.set(nk,{r:nr,c:nc});        }      }    }    return -1; // sin ruta → random  }};  const m=Array.from({length:ROWS},()=>new Array(COLS).fill(0));  const rng=((s)=>{let x=s;return()=>{x=(x*1664525+1013904223)&0x7fffffff;return x/0x7fffffff;}})(lvl*997+13);  // Bordes acero  for(let c=0;c<COLS;c++){m[0][c]=T.S;m[ROWS-1][c]=T.S;}  for(let r=0;r<ROWS;r++){m[r][0]=T.S;m[r][COLS-1]=T.S;}  // Base  const BC=COLS/2-1, BR=ROWS-2;  m[BR][BC]=T.BASE;  // Defensa inicial base  [[BR-1,BC],[BR,BC-1],[BR,BC+1]].forEach(([r,c])=>{if(m[r][c]===T.E)m[r][c]=T.B;});  // Relleno procedural  const density=Math.min(0.22+lvl*0.018,0.4);  for(let r=1;r<ROWS-1;r++){    for(let c=1;c<COLS-1;c++){      if(m[r][c]!==T.E)continue;      if(rng()<density){        const v=rng();        if(v<.55)m[r][c]=T.B;        else if(v<.70&&lvl>2)m[r][c]=T.S;        else if(v<.80&&lvl>3)m[r][c]=T.W;        else m[r][c]=T.X;      }    }  }  // Spawn jugador libre  [[ROWS-3,1],[ROWS-3,2],[ROWS-4,1],[ROWS-4,2]].forEach(([r,c])=>m[r][c]=T.E);  return m;}  ph:null,sc:null,  state:'menu',  lvl:1,score:0,hi:0,lives:3,  map:null,mapGfx:null,  player:null,  bullets:[],enemies:[],pups:[],  particles:[],  eTotal:0,eKilled:0,  frozenUntil:0,shieldUntil:0,speedOn:false,  pu:[0,0,0,0],  combo:0,lastKillTime:0,  _maxField:4,_nextSpawn:0,_spawnSeq:0,  // Input virtual  joyDir:-1,       // -1=nada, 0..3  firePressed:false,  _fireCooldown:0,  startGame(){
